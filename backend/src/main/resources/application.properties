spring.application.name=backend
spring.profiles.default=backend

spring.datasource.url=jdbc:postgresql://localhost:5433/magicvs
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

deck.validation.min-cards=${DECK_MIN_CARDS:60}
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

server.port=${PORT:8080}

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false

ingestion.stream=${INGESTION_STREAM:magicvs:ingestion:jobs}
ingestion.consumer-group=${INGESTION_CONSUMER_GROUP:magicvs-ingestion-workers}
ingestion.consumer-name=${INGESTION_CONSUMER_NAME:${HOSTNAME:local-worker}}
ingestion.dlq-stream=${INGESTION_DLQ_STREAM:magicvs:ingestion:jobs:dlq}
ingestion.max-attempts=${INGESTION_MAX_ATTEMPTS:5}
ingestion.poll-delay-ms=${INGESTION_POLL_DELAY_MS:1000}
ingestion.retry-scheduler-delay-ms=${INGESTION_RETRY_SCHEDULER_DELAY_MS:5000}

# SMTP settings (set SMTP_USER and SMTP_PASS in environment for credentials)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
